syntax = "proto3";

package sentinel.api.v1;

// Generate Go code in this directory
option go_package = "./api/v1/pb";

service RateLimiterService {
  // Check if a specific key (IP/UserID) is allowed
  rpc Allow(AllowRequest) returns (AllowResponse);
  // Check what algo are available
  rpc ListAlgorithms(ListAlgorithmsRequest) returns (ListAlgorithmsResponse);
  // Dynamically update the rate limiting algorithm
  rpc UpdateAlgorithm(UpdateAlgorithmRequest) returns (UpdateAlgorithmResponse);
  // Check what current algorithm is being used
  rpc GetCurrentAlgorithm(GetCurrentAlgorithmRequest) returns (GetCurrentAlgorithmResponse);
}

message AllowRequest {
  string key = 1;
}

message AllowResponse {
  bool allowed = 1;
  int32 limit = 2;
  int32 remaining = 3;
  int32 reset = 4;
}

message ListAlgorithmsRequest {}

message ListAlgorithmsResponse {
  repeated string algorithms = 1;
}

message UpdateAlgorithmRequest {
  string algo = 1;
}

message UpdateAlgorithmResponse {
  bool success = 1;
}

message GetCurrentAlgorithmRequest {}

message GetCurrentAlgorithmResponse {
  string algorithm = 1;
}
